<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/grocery-tracker/cart.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basket — Grocery Price Tracker</title>
    <script>
      // GitHub Pages SPA redirect — restores path from query string set by 404.html
      (function() {
        var p = window.location.search.match(/[?&]p=([^&]*)/);
        if (p) {
          var path = decodeURIComponent(p[1].replace(/~and~/g, '&'));
          window.history.replaceState(null, null, '/' + path + (window.location.hash || ''));
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
