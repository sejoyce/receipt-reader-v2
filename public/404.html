<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Basket</title>
    <script>
      // GitHub Pages 404 → SPA redirect trick
      // Converts the path into a query string so index.html can redirect back
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
